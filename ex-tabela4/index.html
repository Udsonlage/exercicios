<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercício de tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 400px;
            border-collapse: collapse;
        }

        caption {
            font-weight: bold;
            font-size: 1.3em;
        }

        th, td {
            padding: 10px;
            border: 1px solid black;
        }

        .cnome {
            background-color: chartreuse;
        }

        .cgrupo {
            background-color: aqua;
        }
    </style>
</head>
<body>
    <h1>Exercício de Tabela</h1>
    <table>
        <!--
        Para preenchermos a cores de acordo com colunas, e não linhas, podemos usar a tag <colgroup>

        Para selecionar as colunas, usamos a tag <col> de acordo com a quantidade de colunas que temos na tabela.
        - Ex.: Coloquei 4 <col> pq tem 4 colunas na minha tabela.

        Podemos usar a declaração span dentro do <col> para selecionar mais de uma coluna. Determinamos o número dentro das aspas de acordo com as colunas que queremos afetar.
        -->
        <colgroup>
        <col class="cnome">
        <col class="csexo">
        <col class="cgrupo" span="2">
        </colgroup>
        <caption>Cadastro</caption>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Sexo</th>
                <th>Idade</th>
                <th>Profissão</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Ana Maria</td>
                <td>F</td>
                <td>25</td>
                <td>Jornalista</td>
            </tr>
            <tr>
                <td>Cláudio</td>
                <td>M</td>
                <td>28</td>
                <td>Programador</td>
            </tr>
            <tr>
                <td>Gustavo</td>
                <td>M</td>
                <td>42</td>
                <td>Professor</td>
            </tr>
            <tr>
                <td>Hélio</td>
                <td>M</td>
                <td>19</td>
                <td>Vendedor</td>
            </tr>
            <tr>
                <td>Maria</td>
                <td>F</td>
                <td>39</td>
                <td>Médica</td>
            </tr>
            <tr>
                <td>Otávio</td>
                <td>M</td>
                <td>22</td>
                <td>Nutricionista</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
